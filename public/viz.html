<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GTEx Network</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    @import "./styles.css";
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  fetching graph
</div>

<div id="error-bar"></div>

<header>
  <h1>GTEx Network</h1>
  <div id="status">nodes: <span id="stat-nodes">—</span> &nbsp; edges: <span id="stat-edges">—</span></div>
</header>

<main>

  <!-- ── LEFT PANEL ─────────────────────────────────────── -->
  <aside id="left-panel">

    <!-- Disease search -->
    <div class="panel-section" id="disease-search-section">
      <div class="panel-label">Disease search</div>
      <div class="search-row">
        <input
          id="disease-search-input"
          type="text"
          placeholder="disease name…"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="disease-search-btn" title="Search">▶</button>
        <button id="disease-search-clear" title="Clear">✕</button>
      </div>
      <div id="disease-search-status" class="search-status"></div>
      <div id="disease-search-dropdown" class="search-dropdown"></div>
    </div>

  </aside>

  <!-- ── GRAPH ──────────────────────────────────────────── -->
  <div id="cy">
    <div id="toast"></div>
  </div>

  <!-- ── RIGHT PANEL ────────────────────────────────────── -->
  <aside id="right-panel">

    <div class="panel-section">
      <div class="panel-label">Selected</div>
      <div id="detail-content" style="color: var(--text); font-size:10px;">
        click a node
      </div>
    </div>

    <div id="search-panel">
      <div id="search-row">
        <input
          id="search-input"
          type="text"
          placeholder="gene id or label…"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="search-btn" title="Search">▶</button>
        <button id="search-clear" title="Clear">✕</button>
      </div>
      <div id="search-status"></div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Legend</div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot clique"></div>
          clique node
        </div>
        <div class="legend-item">
          <div class="legend-dot leaf"></div>
          leaf node
        </div>
        <div class="legend-item">
          <div class="legend-line internal"></div>
          internal edge
        </div>
        <div class="legend-item">
          <div class="legend-line boundary"></div>
          boundary edge
        </div>
      </div>
    </div>

    <div class="panel-section">
      <button class="fit-btn" id="fit-btn">fit to screen</button>
    </div>

  </aside>
</main>

<script src="./main.js"></script>
</body>
</html>
